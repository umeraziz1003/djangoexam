{% extends 'base.html' %}

{% block title %}Logout — Result Management System{% endblock %}

{% block content %}
<div class="rms-auth-bg">
    <div class="rms-login-card text-center">
        <div class="rms-login-logo justify-content-center">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <div>
                <div class="logo-text">RMS<span>Core</span></div>
                <div class="logo-sub">Result Management</div>
            </div>
        </div>

        <div class="mb-4">
            <div class="rms-stat-icon purple mx-auto mb-3" style="width:60px;height:60px;font-size:24px;">
                <i class="fas fa-right-from-bracket"></i>
            </div>
            <h2 class="fs-5 fw-bold mb-1">Sign out?</h2>
            <p class="text-muted mb-0" style="font-size:14px;">You'll need to sign in again to access the system.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">
                <i class="fas fa-right-from-bracket"></i> Yes, Sign Me Out
            </button>
        </form>
        <a class="btn btn-ghost w-100" href="{% url 'accounts:dashboard' %}">
            <i class="fas fa-arrow-left"></i> Cancel
        </a>
    </div>
</div>
{% endblock %}
